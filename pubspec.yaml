name: scribble
description: "A simple notes app"
publish_to: 'none' 

version: 5.0.0+9

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  path_provider: ^2.1.6
  google_fonts: ^8.1.0
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.20.3
  hive_flutter: ^1.1.0
  flutter_bloc: ^9.1.1
  equatable: ^2.1.0
  flutter_slidable: ^4.0.3
  lottie: ^3.5.1
  share_plus: ^13.2.0
  sqflite: ^2.4.3
  path: ^1.9.1
  stream_transform: ^2.1.1
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  mocktail: ^1.0.5
  sqflite_common_ffi: ^2.4.2

flutter:
  uses-material-design: true

  assets:
    - assets/icons/ 
    - assets/lottie/
   
